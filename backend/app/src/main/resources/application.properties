spring.application.name=news-backend

# SQLite
spring.datasource.url=jdbc:sqlite:./data/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Hibernate batch insert/update (N INSERT를 1 round trip 으로 묶음)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# schema.sql 자동 실행 (CREATE TABLE IF NOT EXISTS)
spring.sql.init.mode=always

# springdoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs

# RSS 스케줄러 (운영: 10분 주기)
news.rss.scheduler.enabled=true
news.rss.scheduler.interval-ms=600000
news.rss.scheduler.initial-delay-ms=5000

# CORS (Next.js dev server)
news.cors.allowed-origins=http://localhost:3000
